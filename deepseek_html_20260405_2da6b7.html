    <script>
        // ------------------------------ CONFIGURATION ---------------------------------
        // ==== GANTI DENGAN SUPABASE CREDENTIALS ANDA ====
        const SUPABASE_URL = "https://abcdefghijklmnop.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3ZWZnaGprbG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTg0NzY0MDAsImV4cCI6MjAxNDA1MjQwMH0.TU7dE8f9gH2jK3lL4zM5nN6pP7qQ8rR9sS0tT1uU2vV3wW4xX5yY6zZ";

        // Global state

        // Helper: show/hide auth & app
        function showAuth() {
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
        }
        function showApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            loadAllInitialData();
        }
        
        // Authentication listeners
        async function handleLogin(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = data.user;
            showApp();
        }
        async function handleRegister(email, password) {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user) {
                alert("Pendaftaran berhasil! Silakan login.");
                document.getElementById('loginPanel').classList.remove('hidden');
                document.getElementById('registerPanel').classList.add('hidden');

        }
        async function handleLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            showAuth();
            resetPanels();
        }
        
        // Check existing session
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                showApp();
            } else {
                showAuth();
            }
        }
        
        // ---- DATA CRUD Operations (user-scoped) ----
        async function addPurchase(data) {
            const { error } = await supabase.from('purchases').insert({
                user_id: currentUser.id,
                date: data.date,
                farmer_name: data.farmer_name,
                commodity: data.commodity,
                quantity: data.quantity,
                price_per_kg: data.price_per_kg,
                created_at: new Date()
            });
            if (error) throw error;
        }
        async function addSale(data) {
            const { error } = await supabase.from('sales').insert({
                user_id: currentUser.id,
                date: data.date,
                buyer_name: data.buyer_name,
                commodity: data.commodity,
                quantity: data.quantity,
                price_per_kg: data.price_per_kg,
                created_at: new Date()
            });
            if (error) throw error;
        }
        async function fetchPurchases() {
            const { data, error } = await supabase.from('purchases').select('*').eq('user_id', currentUser.id).order('date', { ascending: false });
            if (error) throw error;
            return data || [];
        }
        async function fetchSales() {
            const { data, error } = await supabase.from('sales').select('*').eq('user_id', currentUser.id).order('date', { ascending: false });
            if (error) throw error;
            return data || [];
        }
        async function fetchBuyers() {
            const { data, error } = await supabase.from('buyers').select('*').eq('user_id', currentUser.id).order('buyer_name');
            if (error) throw error;
            return data || [];
        }
        async function addBuyer(buyer) {
            const { error } = await supabase.from('buyers').insert({ ...buyer, user_id: currentUser.id });
            if (error) throw error;
        }
        async function updateBuyer(id, updates) {
            const { error } = await supabase.from('buyers').update(updates).eq('id', id).eq('user_id', currentUser.id);
            if (error) throw error;
        }
        async function deleteBuyer(id) {
            const { error } = await supabase.from('buyers').delete().eq('id', id).eq('user_id', currentUser.id);
            if (error) throw error;
        }
        
        // ---- Stock Calculation (Copra, Clove, Nutmeg, Coconut) ----
        async function computeStock() {
            const purchases = await fetchPurchases();
            const sales = await fetchSales();
            const commodities = ['Copra', 'Clove', 'Nutmeg', 'Coconut'];
            const stockMap = {};
            commodities.forEach(c => { stockMap[c] = 0; });
            purchases.forEach(p => {
                if (commodities.includes(p.commodity)) stockMap[p.commodity] += p.quantity;
            });
            sales.forEach(s => {
                if (commodities.includes(s.commodity)) stockMap[s.commodity] -= s.quantity;
            });
            return stockMap;
        }
        
        // Profit analytics (average purchase price method)
        async function getProfitAnalytics() {
            const purchases = await fetchPurchases();
            const sales = await fetchSales();
            // total purchase value
            const totalPurchaseValue = purchases.reduce((sum, p) => sum + (p.quantity * p.price_per_kg), 0);
            const totalSalesValue = sales.reduce((sum, s) => sum + (s.quantity * s.price_per_kg), 0);
            // average purchase price per commodity (weighted)
            const commodityAvgPurchase = {};
            const commodityTotalQty = {};
            purchases.forEach(p => {
                const comm = p.commodity;
                if (!commodityAvgPurchase[comm]) { commodityAvgPurchase[comm] = 0; commodityTotalQty[comm] = 0; }
                commodityAvgPurchase[comm] += p.quantity * p.price_per_kg;
                commodityTotalQty[comm] += p.quantity;
            });
            for (let c in commodityAvgPurchase) {
                if (commodityTotalQty[c] > 0) commodityAvgPurchase[c] = commodityAvgPurchase[c] / commodityTotalQty[c];
                else commodityAvgPurchase[c] = 0;
            }
            let totalProfit = 0;
            for (let sale of sales) {
                let avgBuyPrice = commodityAvgPurchase[sale.commodity] || 0;
                let profitPerKg = sale.price_per_kg - avgBuyPrice;
                totalProfit += profitPerKg * sale.quantity;
            }
            return { totalPurchaseValue, totalSalesValue, totalProfit: totalProfit > 0 ? totalProfit : 0 };
        }
        
        // Export to Excel (Sales + avg purchase price + profit)
        async function exportReportToExcel() {
            const sales = await fetchSales();
            const purchasesAll = await fetchPurchases();
            const commodityAvg = {};
            const totalQty = {};
            purchasesAll.forEach(p => {
                if (!commodityAvg[p.commodity]) { commodityAvg[p.commodity] = 0; totalQty[p.commodity] = 0; }
                commodityAvg[p.commodity] += p.quantity * p.price_per_kg;
                totalQty[p.commodity] += p.quantity;
            });
            for (let c in commodityAvg) if (totalQty[c] > 0) commodityAvg[c] = commodityAvg[c] / totalQty[c];
            const rows = sales.map(sale => {
                const avgPrice = commodityAvg[sale.commodity] || 0;
                const profit = (sale.price_per_kg - avgPrice) * sale.quantity;
                return {
                    "Tanggal": sale.date,
                    "Komoditas": sale.commodity,
                    "Quantity (kg)": sale.quantity,
                    "Harga Beli Rata2 (Rp/kg)": avgPrice.toFixed(2),
                    "Harga Jual (Rp/kg)": sale.price_per_kg,
                    "Profit (Rp)": profit.toFixed(2)
                };
            });
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan Penjualan");
            XLSX.writeFile(wb, `TaniCatat_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
        
        // --- UI Rendering Functions (modular)---
        async function renderDashboard() {

            const stockMap = await computeStock();

                        <div class="bg-white p-4 rounded-xl shadow-sm text-center"><i class="fas fa-chart-line text-blue-600 text-2xl"></i><p class="text-gray-500 text-sm">Total Penjualan</p><p class="font-bold text-xl">Rp ${profitData.totalSalesValue.toLocaleString()}</p></div>

                </div>
            `;
            document.getElementById('dashboardPanel').innerHTML = html;
        }
        
        async function renderPurchases() {
            const purchases = await fetchPurchases();
            const formHtml = `<div class="bg-white p-4 rounded-xl shadow-sm mb-5"><h2 class="font-bold text-lg mb-3"><i class="fas fa-tractor mr-2"></i>Catat Pembelian Petani</h2><form id="purchaseForm" class="space-y-3"><input type="date" id="purchaseDate" class="w-full p-2 border rounded" required><input type="text" id="farmerName" placeholder="Nama Petani" class="w-full p-2 border rounded" required><select id="purchaseCommodity" class="w-full p-2 border rounded"><option>Copra</option><option>Clove</option><option>Nutmeg</option><option>Coconut</option><option>Palm Oil</option><option>Kopi</option></select><input type="number" id="purchaseWeight" placeholder="Berat (kg)" step="any" class="w-full p-2 border rounded" required><input type="number" id="purchasePriceKg" placeholder="Harga per kg (Rp)" step="any" class="w-full p-2 border rounded" required><button type="submit" class="bg-emerald-700 w-full text-white py-2 rounded-lg font-bold">Simpan Pembelian</button></form></div><h3 class="font-semibold mt-4">Riwayat Pembelian</h3><div class="overflow-auto max-h-96"><table class="min-w-full bg-white rounded text-sm"><thead class="bg-gray-100"><tr><th class="p-2">Tanggal</th><th>Petani</th><th>Komoditas</th><th>Kg</th><th>Harga/Kg</th><th>Total</th></tr></thead><tbody id="purchaseList"></tbody></table></div>`;
            document.getElementById('purchasesPanel').innerHTML = formHtml;
            const tbody = document.getElementById('purchaseList');

        async function renderSales() {

            const formHtml = `<div class="bg-white p-4 rounded-xl shadow-sm mb-5"><h2 class="font-bold text-lg mb-3"><i class="fas fa-hand-holding-usd mr-2"></i>Catat Penjualan ke Penadah</h2><form id="salesForm" class="space-y-3"><input type="date" id="saleDate" class="w-full p-2 border rounded" required><input type="text" id="buyerName" placeholder="Nama Pembeli" class="w-full p-2 border rounded" required><select id="saleCommodity" class="w-full p-2 border rounded"><option>Copra</option><option>Clove</option><option>Nutmeg</option><option>Coconut</option><option>Palm Oil</option><option>Kopi</option></select><input type="number" id="saleQuantity" placeholder="Jumlah (kg)" step="any" required class="w-full p-2 border rounded"><input type="number" id="salePrice" placeholder="Harga jual per kg (Rp)" step="any" required class="w-full p-2 border rounded"><button type="submit" class="bg-blue-700 w-full text-white py-2 rounded-lg font-bold">Simpan Penjualan</button></form></div><h3 class="font-semibold mt-4">Riwayat Penjualan</h3><div class="overflow-auto max-h-96"><table class="min-w-full bg-white rounded text-sm"><thead class="bg-gray-100"><tr><th>Tanggal</th><th>Pembeli</th><th>Komoditas</th><th>Kg</th><th>Harga Jual</th><th>Total</th></tr></thead><tbody id="salesList"></tbody></table></div>`;

        async function renderStock() {

        // National Price Simulation with Chart
        async function renderNationalPrices() {
            const commoditiesPrice = [
                { name: "Copra", price: 7850, trend: "▲ +2%" }, { name: "Clove", price: 142500, trend: "▲ +1.2%" },
                { name: "Nutmeg", price: 98000, trend: "▼ -0.5%" }, { name: "Palm Oil", price: 12100, trend: "▲ +0.8%" }
            ];
            const html = `<div class="bg-white p-4 rounded-xl shadow-sm"><h2 class="font-bold text-lg mb-2">🏷️ Harga Rata-rata Nasional (Simulasi)</h2><div class="space-y-2">${commoditiesPrice.map(c => `<div class="flex justify-between border-b py-2"><span class="font-medium">${c.name}</span><span>Rp ${c.price.toLocaleString()}/kg</span><span class="text-sm ${c.trend.includes('▲')?'text-green-600':'text-red-600'}">${c.trend}</span></div>`).join('')}</div><canvas id="nationalChartCanvas" class="mt-5 h-48 w-full"></canvas></div>`;
            document.getElementById('nationalPanel').innerHTML = html;
            const ctx = document.getElementById('nationalChartCanvas').getContext('2d');
            if (nationalChart) nationalChart.destroy();
            nationalChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: commoditiesPrice.map(c=>c.name), datasets: [{ label: 'Harga (Rp/kg)', data: commoditiesPrice.map(c=>c.price), backgroundColor: '#2c7a4d', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
            });
        }
        
        async function renderBuyers() {
            const buyers = await fetchBuyers();
            const html = `<div class="bg-white p-4 rounded-xl shadow-sm"><div class="flex justify-between items-center"><h2 class="font-bold text-lg">📋 Direktori Buyer Besar</h2><button id="addBuyerBtn" class="bg-emerald-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> Tambah</button></div><div class="overflow-x-auto mt-3"><table class="min-w-full text-sm"><thead><tr class="bg-gray-100"><th>Nama</th><th>Komoditas</th><th>Wilayah</th><th>Estimasi Harga</th><th>Aksi</th></tr></thead><tbody id="buyerTableBody"></tbody></table></div></div>`;
            document.getElementById('buyersPanel').innerHTML = html;
            const tbody = document.getElementById('buyerTableBody');
            tbody.innerHTML = buyers.map(b => `<tr class="border-b"><td class="p-2">${b.buyer_name}</td><td>${b.commodity}</td><td>${b.region || '-'}</td><td>Rp ${b.estimated_buying_price?.toLocaleString() || '-'}</td><td><button onclick="editBuyer('${b.id}')" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="removeBuyer('${b.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('');
            window.editBuyer = async (id) => {
                const buyer = buyers.find(b=>b.id === id);
                const newName = prompt("Nama Buyer:", buyer.buyer_name);
                if(newName) await updateBuyer(id, { buyer_name: newName });
                renderBuyers();
            };
            window.removeBuyer = async (id) => { if(confirm("Hapus buyer?")) { await deleteBuyer(id); renderBuyers(); } };
            document.getElementById('addBuyerBtn').addEventListener('click', async () => {
                const name = prompt("Nama Buyer:");
                if(name) await addBuyer({ buyer_name: name, commodity: "Copra", region: "Jakarta", website: "", estimated_buying_price: 0 });
                renderBuyers();
            });
        }
        
        async function renderReports() {
            const profitData = await getProfitAnalytics();
            const html = `<div class="bg-white p-5 rounded-xl shadow-sm space-y-5"><h2 class="text-xl font-bold">📊 Analisis Keuntungan</h2><div class="grid grid-cols-2 gap-3"><div class="bg-green-50 p-3 rounded"><p>Total Pembelian</p><p class="font-bold">Rp ${profitData.totalPurchaseValue.toLocaleString()}</p></div><div class="bg-blue-50 p-3 rounded"><p>Total Penjualan</p><p class="font-bold">Rp ${profitData.totalSalesValue.toLocaleString()}</p></div><div class="bg-amber-50 p-3 rounded col-span-2"><p>Estimasi Profit (Metode rata-rata)</p><p class="font-bold text-xl text-emerald-700">Rp ${profitData.totalProfit.toLocaleString()}</p></div></div><button id="exportExcelBtn" class="bg-emerald-700 text-white w-full py-3 rounded-xl font-bold shadow-md"><i class="fas fa-file-excel mr-2"></i> Export ke Excel (Laporan Penjualan)</button><canvas id="profitChart" class="mt-5 h-48"></canvas></div>`;
            document.getElementById('reportsPanel').innerHTML = html;
            const ctx = document.getElementById('profitChart').getContext('2d');
            new Chart(ctx, { type: 'bar', data: { labels: ['Pembelian', 'Penjualan', 'Profit'], datasets: [{ label: 'Rp', data: [profitData.totalPurchaseValue, profitData.totalSalesValue, profitData.totalProfit], backgroundColor: ['#f97316','#3b82f6','#10b981'] }] } });
            document.getElementById('exportExcelBtn').addEventListener('click', () => exportReportToExcel());
        }
        
        async function loadAllInitialData() { await Promise.all([renderDashboard(), renderPurchases(), renderSales(), renderStock(), renderBuyers(), renderNationalPrices(), renderReports()]); }
        function resetPanels() { document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden')); }
        
        // Tab switching
        function initTabs() {
            const btns = document.querySelectorAll('.tab-btn');
            const panels = {
                dashboard: 'dashboardPanel', purchases: 'purchasesPanel', sales: 'salesPanel', stock: 'stockPanel',
                buyers: 'buyersPanel', national: 'nationalPanel', reports: 'reportsPanel'
            };
            function showPanel(panelId) { resetPanels(); document.getElementById(panelId).classList.remove('hidden'); }
            btns.forEach(btn => {
                btn.addEventListener('click', async () => {
                    const tab = btn.getAttribute('data-tab');
                    if (panels[tab]) showPanel(panels[tab]);
                    if (tab === 'dashboard') await renderDashboard();
                    if (tab === 'purchases') await renderPurchases();
                    if (tab === 'sales') await renderSales();
                    if (tab === 'stock') await renderStock();
                    if (tab === 'buyers') await renderBuyers();
                    if (tab === 'national') await renderNationalPrices();
                    if (tab === 'reports') await renderReports();
                    btns.forEach(b => b.classList.remove('active-tab', 'bg-emerald-700', 'text-white'));
                    btn.classList.add('active-tab', 'bg-emerald-700', 'text-white');
                });
            });
            showPanel('dashboardPanel');
            if(btns[0]) btns[0].classList.add('active-tab', 'bg-emerald-700', 'text-white');
        }
        
        // Auth UI events
        document.getElementById('loginBtn').onclick = async () => { try { await handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } catch(e) { document.getElementById('authMessage').innerText = e.message; } };
        document.getElementById('registerBtn').onclick = async () => { try { await handleRegister(document.getElementById('regEmail').value, document.getElementById('regPassword').value); } catch(e) { document.getElementById('authMessage').innerText = e.message; } };
        document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginPanel').classList.add('hidden'); document.getElementById('registerPanel').classList.remove('hidden'); };
        document.getElementById('showLoginBtn').onclick = () => { document.getElementById('registerPanel').classList.add('hidden'); document.getElementById('loginPanel').classList.remove('hidden'); };
        document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
        
        // Start app
        checkSession().then(() => { if(currentUser) initTabs(); });
        window.addEventListener('load', () => { if(currentUser) initTabs(); });
    </script>
